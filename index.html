<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MapTap Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #242424;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --accent: #4ade80;
    --accent2: #22c55e;
    --danger: #f87171;
    --warning: #fbbf24;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    padding: 1.25rem 1.5rem;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .user-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: 99px;
    padding: 6px 12px 6px 6px;
    font-size: 13px;
    color: var(--text2);
  }
  .logout-btn { background:none; border:none; color:var(--text3); font-size:14px; cursor:pointer; padding:0 0 0 4px; line-height:1; }
  .logout-btn:hover { color:var(--danger); }

  /* PLAYER SELECTOR */
  .player-grid { display:flex; gap:10px; margin-top:2rem; flex-wrap:wrap; justify-content:center; }
  .player-card {
    display:flex; flex-direction:column; align-items:center; gap:8px;
    background:var(--bg2); border:0.5px solid var(--border);
    border-radius:var(--radius); padding:1.1rem 1rem;
    cursor:pointer; transition:all 0.15s; min-width:80px;
  }
  .player-card:hover { border-color:var(--pc,var(--accent)); transform:translateY(-2px); }
  .player-initial {
    width:44px; height:44px; border-radius:50%;
    border:1.5px solid var(--pc,var(--accent)); color:var(--pc,var(--accent));
    font-size:18px; font-weight:600;
    display:flex; align-items:center; justify-content:center;
  }
  .player-name-label { font-size:12px; color:var(--text2); }

  /* NAV */
  nav {
    display: flex;
    gap: 2px;
    padding: 1rem 1.5rem 0;
    border-bottom: 0.5px solid var(--border);
  }
  nav button {
    background: none;
    border: none;
    color: var(--text3);
    font-size: 14px;
    font-weight: 500;
    padding: 8px 16px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -0.5px;
    transition: all 0.15s;
  }
  nav button.active { color: var(--text); border-bottom-color: var(--accent); }
  nav button:hover:not(.active) { color: var(--text2); }

  /* MAIN */
  main { flex: 1; padding: 1.5rem; width: 100%; }

  .section { display: none; }
  .section.active { display: block; }

  /* LOGIN */
  #login-view {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 70vh;
    gap: 1.5rem;
    text-align: center;
  }
  .login-icon { font-size: 48px; margin-bottom: 0.5rem; }
  .login-title { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; }
  .login-sub { font-size: 14px; color: var(--text2); max-width: 280px; line-height: 1.6; }
  .google-signin-btn { display:flex; align-items:center; gap:10px; padding:10px 20px; background:#fff; color:#3c4043; border:none; border-radius:4px; font-size:14px; font-weight:500; cursor:pointer; margin-top:1.5rem; box-shadow:0 1px 3px rgba(0,0,0,.3); }
  .google-signin-btn:hover { background:#f8f8f8; box-shadow:0 2px 6px rgba(0,0,0,.4); }

  /* CARDS */
  .card {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1rem;
  }
  .card-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 1rem;
  }

  /* SUBMIT */
  textarea {
    width: 100%;
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 14px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    padding: 12px;
    resize: none;
    height: 110px;
    line-height: 1.6;
    transition: border 0.15s;
    outline: none;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text3); }

  .submit-btn {
    width: 100%;
    margin-top: 12px;
    padding: 12px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    color: #0a0a0a;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .submit-btn:hover { background: var(--accent2); }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn:disabled { background: var(--bg3); color: var(--text3); cursor: not-allowed; transform: none; }

  /* PREVIEW */
  .preview {
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    margin-top: 12px;
    display: none;
  }
  .preview.visible { display: block; }
  .preview-row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; }
  .preview-label { color: var(--text2); }
  .preview-val { font-weight: 500; }
  .preview-rounds { display: flex; gap: 6px; margin-top: 8px; }
  .round-chip {
    flex: 1;
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: 6px;
    text-align: center;
    padding: 6px 4px;
    font-size: 12px;
    font-weight: 500;
  }

  /* MSG */
  .msg {
    margin-top: 10px;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    display: none;
  }
  .msg.ok { background: rgba(74,222,128,0.1); color: var(--accent); border: 0.5px solid rgba(74,222,128,0.2); }
  .msg.err { background: rgba(248,113,113,0.1); color: var(--danger); border: 0.5px solid rgba(248,113,113,0.2); }
  .msg.visible { display: block; }

  /* METRICS */
  .metrics {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 1rem;
  }
  .metric {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
  }
  .metric-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .metric-value { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
  .metric-sub { font-size: 12px; color: var(--text2); margin-top: 3px; }

  /* RANKING */
  .ranking-list { list-style: none; }
  .ranking-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 0.5px solid var(--border);
  }
  .ranking-item:last-child { border-bottom: none; }
  .rank-num { font-size: 13px; font-weight: 600; color: var(--text3); width: 18px; text-align: center; }
  .rank-num.gold { color: #fbbf24; }
  .rank-num.silver { color: #94a3b8; }
  .rank-num.bronze { color: #b45309; }
  .rank-avatar-circle {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; flex-shrink: 0;
  }
  .rank-info { flex: 1; }
  .rank-name { font-size: 14px; font-weight: 500; }
  .rank-detail { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .rank-score { font-size: 15px; font-weight: 600; color: var(--accent); }

  /* BAR CHART */
  .bar-chart { display: flex; flex-direction: column; gap: 10px; }
  .bar-row { display: flex; align-items: center; gap: 10px; }
  .bar-name { font-size: 13px; color: var(--text2); width: 60px; flex-shrink: 0; text-align: right; }
  .bar-track { flex: 1; background: var(--bg3); border-radius: 4px; height: 8px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; background: var(--accent); transition: width 0.6s ease; }
  .bar-val { font-size: 12px; font-weight: 500; width: 36px; text-align: right; }

  /* HISTORY TABLE */
  .history { width: 100%; border-collapse: collapse; font-size: 13px; }
  .history th { color: var(--text3); font-weight: 500; text-align: left; padding: 6px 8px; border-bottom: 0.5px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  .card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; }
  .card-header .card-title { margin-bottom:0; }
  .toggle-pill { display:flex; background:var(--bg3); border-radius:6px; padding:2px; gap:2px; }
  .toggle-pill button { background:none; border:none; color:var(--text2); font-size:11px; padding:4px 10px; border-radius:4px; cursor:pointer; }
  .toggle-pill button.active { background:var(--surface2,#2a2a2a); color:var(--text); }
  .chart-wrap { position:relative; height:320px; }
  .fullscreen-btn { background:none; border:none; color:var(--text3); cursor:pointer; padding:2px; line-height:1; display:flex; align-items:center; margin-left:6px; }
  .fullscreen-btn:hover { color:var(--text); }
  .card.chart-fullscreen { position:fixed; inset:0; z-index:9999; border-radius:0 !important; display:flex; flex-direction:column; overflow:hidden; margin:0; }
  .card.chart-fullscreen .chart-wrap { flex:1; height:auto !important; min-height:0; }
  .history th.sortable { cursor: pointer; user-select: none; white-space: nowrap; }
  .history th.sortable:hover { color: var(--text2); }
  .history th.sort-active { color: var(--accent); }
  .month-filter { background:var(--bg3); border:0.5px solid var(--border2); color:var(--text); border-radius:6px; padding:4px 10px; font-size:12px; cursor:pointer; outline:none; }
  .history-scroll { overflow-y:auto; max-height:420px; }
  .history-scroll::-webkit-scrollbar { width:4px; }
  .history-scroll::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

  /* DATE RANGE SLIDER */
  .date-range { margin: 8px 4px 0; }
  .date-range-wrap { position:relative; height:20px; }
  .date-range-wrap input[type=range] {
    position:absolute; width:100%; margin:0; top:50%; transform:translateY(-50%);
    background:transparent; pointer-events:none;
    -webkit-appearance:none; appearance:none; height:100%;
  }
  .date-range-wrap input[type=range]::-webkit-slider-thumb {
    pointer-events:all; -webkit-appearance:none;
    width:16px; height:16px; border-radius:50%;
    background:var(--accent); cursor:grab; border:2px solid var(--bg2);
  }
  .date-range-wrap input[type=range]::-moz-range-thumb {
    pointer-events:all; width:14px; height:14px; border-radius:50%;
    background:var(--accent); cursor:grab; border:2px solid var(--bg2); box-sizing:border-box;
  }
  .date-range-track { position:absolute; top:50%; transform:translateY(-50%); width:100%; height:3px; background:var(--bg3); border-radius:2px; }
  .date-range-fill  { position:absolute; height:100%; background:var(--accent); opacity:0.5; border-radius:2px; }
  .date-range-labels { display:flex; justify-content:space-between; font-size:10px; color:var(--text3); margin-top:3px; }
  .history td { padding: 10px 8px; border-bottom: 0.5px solid var(--border); color: var(--text2); }
  .history td:first-child { color: var(--text); font-weight: 500; }
  .history tr:last-child td { border-bottom: none; }
  .winner-badge {
    background: rgba(74,222,128,0.15);
    color: var(--accent);
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 11px;
    font-weight: 600;
  }

  /* LOADING */
  .loading { text-align: center; padding: 3rem; color: var(--text3); font-size: 14px; }
  .spinner {
    width: 24px; height: 24px; border: 2px solid var(--border2);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* NOT REGISTERED - kept for backwards compat */
  .not-registered {
    background: rgba(251,191,36,0.08);
    border: 0.5px solid rgba(251,191,36,0.2);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1rem;
    font-size: 14px;
    color: var(--warning);
    line-height: 1.6;
  }

  @media (max-width: 480px) {
    main { padding: 1rem; }
    header { padding: 1rem; }
    .metrics { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    MapTap Tracker
  </div>
  <div class="user-pill" id="user-pill">
    <span id="user-name-header">—</span>
  </div>
</header>

<div id="login-view">
  <div class="login-icon">🗺️</div>
  <div class="login-title">MapTap Tracker</div>
  <div class="login-sub">¿Quién eres?</div>
  <div class="player-grid">
    <button class="player-card" onclick="selectPlayer('Moran')"   style="--pc:#4ade80"><div class="player-initial">M</div><div class="player-name-label">Moran</div></button>
    <button class="player-card" onclick="selectPlayer('Gonzalo')" style="--pc:#60a5fa"><div class="player-initial">G</div><div class="player-name-label">Gonzalo</div></button>
    <button class="player-card" onclick="selectPlayer('Mewis')"   style="--pc:#c084fc"><div class="player-initial">Me</div><div class="player-name-label">Mewis</div></button>
    <button class="player-card" onclick="selectPlayer('Muñi')"    style="--pc:#fb923c"><div class="player-initial">Mu</div><div class="player-name-label">Muñi</div></button>
    <button class="player-card" onclick="selectPlayer('Arias')"   style="--pc:#f472b6"><div class="player-initial">A</div><div class="player-name-label">Arias</div></button>
  </div>
  <button onclick="enterPreviewMode()" style="margin-top:2rem;background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;text-decoration:underline;">Ver demo</button>
</div>

<div id="app-view" style="display:none; flex-direction:column; flex:1;">
  <nav>
    <button class="active" onclick="switchTab('submit')">Enviar</button>
    <button onclick="switchTab('dashboard')">Dashboard</button>
    <button onclick="switchTab('history')">Historial</button>
  </nav>
  <main>

    <!-- SUBMIT -->
    <div id="tab-submit" class="section active">
<div class="card">
        <div class="card-title">Tu resultado de hoy</div>
        <textarea id="result-input"
          placeholder="www.maptap.gg May 14&#10;100🎯 99🎯 100🎯 95🏆 99🎯&#10;Final score: 981"
          oninput="onTextInput(this.value)"></textarea>
        <div class="preview" id="preview">
          <div class="preview-row">
            <span class="preview-label">Fecha</span>
            <span class="preview-val" id="p-fecha">—</span>
          </div>
          <div class="preview-row">
            <span class="preview-label">Jugador</span>
            <span class="preview-val" id="p-jugador">—</span>
          </div>
          <div class="preview-row">
            <span class="preview-label">Score final</span>
            <span class="preview-val" id="p-score">—</span>
          </div>
          <div class="preview-rounds" id="p-rounds"></div>
        </div>
        <button class="submit-btn" id="submit-btn" onclick="submitResult()" disabled>
          Enviar resultado
        </button>
        <div class="msg" id="submit-msg"></div>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div id="tab-dashboard" class="section">
      <div class="loading" id="dashboard-loading">
        <div class="spinner"></div>
        Cargando datos...
      </div>
      <div id="dashboard-content" style="display:none">
        <div class="metrics" id="metrics"></div>
        <div class="card">
          <div class="card-title">Estadísticas</div>
          <table class="history" id="stats-table"></table>
        </div>
        <div class="card" id="score-card">
          <div class="card-header">
            <div class="card-title">Histórico de puntuaciones</div>
            <div style="display:flex;align-items:center;gap:6px">
              <div class="toggle-pill">
                <button class="active" data-g="date" onclick="setChartGranularity('date')">Fecha</button>
                <button data-g="month" onclick="setChartGranularity('month')">Mes</button>
              </div>
              <button class="fullscreen-btn" id="score-fs-btn" onclick="toggleChartFullscreen('score')" title="Pantalla completa"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg></button>
            </div>
          </div>
          <div class="chart-wrap"><canvas id="score-chart"></canvas></div>
          <div id="chart-date-range" class="date-range" style="display:none">
            <div class="date-range-wrap">
              <div class="date-range-track"><div class="date-range-fill" id="range-fill"></div></div>
              <input type="range" id="range-min" min="0" value="0"   oninput="onRangeInput('min')">
              <input type="range" id="range-max" min="0" value="100" oninput="onRangeInput('max')">
            </div>
            <div class="date-range-labels">
              <span id="range-label-min">—</span>
              <span id="range-label-max">—</span>
            </div>
          </div>
        </div>
        <div class="card" id="wins-card">
          <div class="card-header">
            <div class="card-title">Victorias acumuladas</div>
            <div style="display:flex;align-items:center;gap:6px">
              <div class="toggle-pill">
                <button class="active" data-g="date" onclick="setChartGranularity('date')">Fecha</button>
                <button data-g="month" onclick="setChartGranularity('month')">Mes</button>
              </div>
              <button class="fullscreen-btn" id="wins-fs-btn" onclick="toggleChartFullscreen('wins')" title="Pantalla completa"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg></button>
            </div>
          </div>
          <div class="chart-wrap"><canvas id="wins-line-chart"></canvas></div>
        </div>
      </div>
    </div>

    <!-- HISTORY -->
    <div id="tab-history" class="section">
      <div class="loading" id="history-loading">
        <div class="spinner"></div>
        Cargando historial...
      </div>
      <div class="card" id="history-content" style="display:none">
        <div class="card-header">
          <div class="card-title">Historial</div>
          <select id="history-month-filter" class="month-filter" onchange="filterHistory()">
            <option value="">Todos los meses</option>
          </select>
        </div>
        <div class="history-scroll">
          <table class="history" id="history-table"></table>
        </div>
      </div>
    </div>

  </main>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxEfXZI26RGWMDMXwmu0XP81oYBZOKSl-TJQAVv4UGdBSj5JthsLbXlFYZAjrbrBMjP/exec';
const PLAYER_KEY = 'maptap_player';
const PLAYERS    = ['Moran', 'Gonzalo', 'Mewis', 'Muñi', 'Arias'];

const PLAYER_COLORS = {
  'Moran':   { bg: '#1a3a2a', fg: '#4ade80' },
  'Gonzalo': { bg: '#1a2a3a', fg: '#60a5fa' },
  'Mewis':   { bg: '#2a1a3a', fg: '#c084fc' },
  'Muñi':    { bg: '#3a2a1a', fg: '#fb923c' },
  'Arias':   { bg: '#3a1a2a', fg: '#f472b6' },
};

let currentPlayer = null;
let parsedResult = null;
let dashboardLoaded = false;
let historyLoaded = false;
let historyData = [];
let historySortDir = -1; // -1 = newest first, 1 = oldest first
let chartGranularity = 'date';
let scoreChartInstance = null;
let winsChartInstance = null;
let cachedChartData = null;
let chartRangeDates = [];
let chartRangeMin = 0;
let chartRangeMax = 0;
let scoreHiddenPlayers = new Set();
let winsHiddenPlayers  = new Set();

const MONTHS_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

// ─── PLAYER SELECTION ───────────────────────────────────
function selectPlayer(name) {
  currentPlayer = name;
  localStorage.setItem(PLAYER_KEY, name);
  updateHeader();
  document.getElementById('login-view').style.display = 'none';
  document.getElementById('app-view').style.display = 'flex';
}

function logout() {
  localStorage.removeItem(PLAYER_KEY);
  currentPlayer = null;
  parsedResult = null;
  dashboardLoaded = false; historyLoaded = false;
  historyData = []; historySortDir = -1;
  scoreChartInstance?.destroy(); scoreChartInstance = null;
  winsChartInstance?.destroy();  winsChartInstance = null;
  cachedChartData = null;
  document.getElementById('result-input').value = '';
  document.getElementById('preview').classList.remove('visible');
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('user-pill').innerHTML = '<span id="user-name-header">—</span>';

// ─── PARSER ──────────────────────────────────────────────
function parseMapTap(text) {
  try {
    const lines = text.trim().split('\n').map(l => l.trim()).filter(l => l);
    if (lines.length < 3) return null;

    const dateMatch = lines[0].match(/([A-Za-z]+)\s+(\d+)/);
    if (!dateMatch) return null;
    const now = new Date();
    let year = now.getFullYear();
    const d = new Date(`${dateMatch[1]} ${dateMatch[2]} ${year}`);
    if (isNaN(d)) return null;
    if (d.getMonth() > now.getMonth()) d.setFullYear(year - 1);
    const fecha = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

    const nums = lines[1].match(/\d+/g);
    if (!nums || nums.length < 5) return null;
    const rounds = nums.slice(0, 5).map(Number);

    const scoreMatch = lines[2].match(/\d+/);
    if (!scoreMatch) return null;
    const score = Number(scoreMatch[0]);

    return { fecha, rounds, score };
  } catch { return null; }
}

function onTextInput(value) {
  parsedResult = parseMapTap(value);
  const preview = document.getElementById('preview');
  const btn = document.getElementById('submit-btn');

  if (parsedResult && currentPlayer) {
    preview.classList.add('visible');
    document.getElementById('p-fecha').textContent = parsedResult.fecha.split('-').reverse().join('/');

    document.getElementById('p-jugador').innerHTML = `<span style="color:${color}">${currentPlayer}</span>`;
    document.getElementById('p-score').textContent = parsedResult.score;
    document.getElementById('p-rounds').innerHTML = parsedResult.rounds.map((r, i) =>
      `<div class="round-chip">R${i+1}<br>${r}</div>`
    ).join('');
    btn.disabled = false;
  } else {
    preview.classList.remove('visible');
    btn.disabled = true;
  }
}

// ─── SUBMIT ──────────────────────────────────────────────
async function submitResult() {
  if (!parsedResult || !currentPlayer) return;

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Enviando...';
  hideMsg();

  const [r1, r2, r3, r4, r5] = parsedResult.rounds;
  try {
    const res  = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fecha: parsedResult.fecha, jugador: currentPlayer, r1, r2, r3, r4, r5, score: parsedResult.score })
    });
    const json = await res.json();

    if (json.duplicate) {
      showMsg('Este resultado ya estaba registrado.', true);
    } else if (json.ok) {
      showMsg(`Resultado enviado. ${parsedResult.fecha.split('-').reverse().join('/')} · ${currentPlayer} · ${parsedResult.score} pts`, true);
      document.getElementById('result-input').value = '';
      document.getElementById('preview').classList.remove('visible');
      parsedResult = null;
      dashboardLoaded = false; historyLoaded = false;
      historyData = []; historySortDir = -1;
      scoreChartInstance?.destroy(); scoreChartInstance = null;
      winsChartInstance?.destroy();  winsChartInstance = null;
      cachedChartData = null;
    } else {
      showMsg('Error al guardar: ' + (json.error || 'inténtalo de nuevo'), false);
    }
  } catch (e) {
    showMsg('Error de conexión.', false);
  }

  btn.textContent = 'Enviar resultado';
  btn.disabled = false;
}

function showMsg(text, ok) {
  const msg = document.getElementById('submit-msg');
  msg.textContent = text;
  msg.className = 'msg ' + (ok ? 'ok' : 'err') + ' visible';
}
function hideMsg() {
  document.getElementById('submit-msg').className = 'msg';
}

// Convierte cualquier valor de fecha (ISO timestamp o string YYYY-MM-DD) a YYYY-MM-DD en zona horaria España
function toFecha(val) {
  const s = String(val);
  if (!s.includes('T')) return s.slice(0, 10);
  return new Date(s).toLocaleDateString('sv-SE', { timeZone: 'Europe/Madrid' });
}

async function loadDashboard() {

  try {
    const data = await readSheet();
    const stats = computeStats(data);

    console.error('loadDashboard error:', e);

    return;
  }

function computeStats(data) {
  const players = ['Moran', 'Gonzalo', 'Mewis', 'Muñi', 'Arias'];
  const stats = {};
  players.forEach(p => stats[p] = { wins: 0, scores: [], best: 0, entries: 0 });

  const byDate = {};
  data.forEach(r => {
    if (!byDate[r.fecha]) byDate[r.fecha] = [];
    byDate[r.fecha].push(r);
  });

  Object.values(byDate).forEach(entries => {
    const winner = entries.reduce((a, b) => a.score > b.score ? a : b);
    if (stats[winner.jugador]) stats[winner.jugador].wins++;
    entries.forEach(e => {
      if (stats[e.jugador]) {
        stats[e.jugador].scores.push(e.score);
        stats[e.jugador].entries++;
        if (e.score > stats[e.jugador].best) stats[e.jugador].best = e.score;
      }
    });
  });

  Object.keys(stats).forEach(p => {
    const arr = stats[p].scores;
    stats[p].avg = arr.length ? Math.round(arr.reduce((a, b) => a + b, 0) / arr.length) : 0;
  });

  return stats;
}

function renderMetrics(stats, data) {
  const days = new Set(data.map(r => r.fecha)).size;
  const leader = Object.entries(stats).sort((a,b) => b[1].wins - a[1].wins)[0];
  const bestAvg = Object.entries(stats).sort((a,b) => b[1].avg - a[1].avg)[0];
  const recordEntry = data.length ? data.reduce((a, b) => a.score > b.score ? a : b) : null;

  document.getElementById('metrics').innerHTML = `
    <div class="metric">
      <div class="metric-label">Días jugados</div>
      <div class="metric-value">${days}</div>
    </div>
    <div class="metric">
      <div class="metric-label">Líder</div>
      <div class="metric-value">${leader ? leader[0] : '—'}</div>
      <div class="metric-sub">${leader ? leader[1].wins + ' victorias' : ''}</div>
    </div>
    <div class="metric">
      <div class="metric-label">Mejor media</div>
      <div class="metric-value">${bestAvg ? bestAvg[0] : '—'}</div>
      <div class="metric-sub">${bestAvg ? bestAvg[1].avg + ' pts' : ''}</div>
    </div>
    <div class="metric">
      <div class="metric-label">Record</div>
      <div class="metric-value">${recordEntry ? recordEntry.score : '—'}</div>
      <div class="metric-sub">${recordEntry ? recordEntry.jugador : ''}</div>
    </div>
  `;
}

let sortState = { key: 'wins', dir: -1 };
let cachedStatsTable = null;

function renderStatsTable(stats, data) {
  cachedStatsTable = stats;
  const cols = [
    { key: 'name',  label: 'Jugador' },
    { key: 'games', label: 'Games'   },
    { key: 'avg',   label: 'Media'   },
    { key: 'best',  label: 'Best'    },
    { key: 'wins',  label: 'Wins'    },
    { key: 'pct',   label: '%Wins'   },
  ];

  const rows = Object.entries(stats)
    .filter(([, s]) => s.entries > 0)
    .map(([name, s]) => ({
      name,
      games: s.entries,
      avg:   s.avg,
      best:  s.best,
      wins:  s.wins,
      pct:   Math.round(s.wins / s.entries * 100),
    }));

  const { key, dir } = sortState;
  rows.sort((a, b) => key === 'name'
    ? dir * a.name.localeCompare(b.name)
    : dir * (a[key] - b[key]));

  const thead = `<thead><tr>${cols.map(c => {
    const active = c.key === sortState.key;
    const arrow  = active ? (sortState.dir === -1 ? ' ▼' : ' ▲') : '';
    return `<th class="sortable${active ? ' sort-active' : ''}" onclick="sortStatsTable('${c.key}')">${c.label}${arrow}</th>`;
  }).join('')}</tr></thead>`;

  const tbody = `<tbody>${rows.map(r => {
    const fg = PLAYER_COLORS[r.name]?.fg || 'var(--text)';
    return `<tr>
      <td style="color:${fg}">${r.name}</td>
      <td>${r.games}</td>
      <td>${r.avg}</td>
      <td>${r.best}</td>
      <td>${r.wins}</td>
      <td>${r.pct}%</td>
    </tr>`;
  }).join('')}</tbody>`;

  document.getElementById('stats-table').innerHTML = thead + tbody;
}

function sortStatsTable(key) {
  sortState = sortState.key === key
    ? { key, dir: sortState.dir * -1 }
    : { key, dir: key === 'name' ? 1 : -1 };
  if (cachedStatsTable) renderStatsTable(cachedStatsTable);
}

function chartBaseOptions(extra = {}) {
  return {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { labels: { color: '#888', boxWidth: 12, font: { size: 11 } } },
      tooltip: { backgroundColor: '#1a1a1a', borderColor: '#333', borderWidth: 1, titleColor: '#ccc', bodyColor: '#aaa' },
    },
    scales: {
      x: { ticks: { color: '#555', maxRotation: 45, font: { size: 10 } }, grid: { color: '#1e1e1e' } },
      y: { ticks: { color: '#555', font: { size: 10 } }, grid: { color: '#1e1e1e' } },
    },
    ...extra,
  };
}

function initDateRange(dates) {
  const changed = dates.length !== chartRangeDates.length ||
    (dates.length && (dates[0] !== chartRangeDates[0] || dates[dates.length-1] !== chartRangeDates[chartRangeDates.length-1]));
  if (!changed) return;
  chartRangeDates = dates;
  chartRangeMin = 0;
  chartRangeMax = dates.length - 1;
  const max = Math.max(0, dates.length - 1);
  document.getElementById('range-min').max = max;
  document.getElementById('range-max').max = max;
  document.getElementById('range-min').value = 0;
  document.getElementById('range-max').value = max;
  updateRangeFill();
}

function updateRangeFill() {
  const total = Math.max(1, chartRangeDates.length - 1);
  const fill = document.getElementById('range-fill');
  if (fill) {
    fill.style.left  = (chartRangeMin / total * 100) + '%';
    fill.style.width = ((chartRangeMax - chartRangeMin) / total * 100) + '%';
  }
  const fmt = d => d ? d.split('-').reverse().join('/') : '—';
  const elMin = document.getElementById('range-label-min');
  const elMax = document.getElementById('range-label-max');
  if (elMin) elMin.textContent = fmt(chartRangeDates[chartRangeMin]);
  if (elMax) elMax.textContent = fmt(chartRangeDates[chartRangeMax]);
}

function onRangeInput(which) {
  const minEl = document.getElementById('range-min');
  const maxEl = document.getElementById('range-max');
  if (which === 'min') {
    chartRangeMin = Math.min(parseInt(minEl.value), chartRangeMax);
    minEl.value = chartRangeMin;
  } else {
    chartRangeMax = Math.max(parseInt(maxEl.value), chartRangeMin);
    maxEl.value = chartRangeMax;
  }
  updateRangeFill();
  if (cachedChartData) { renderScoreChart(cachedChartData); renderWinsChart(cachedChartData); }
}

function renderScoreChart(data) {
  cachedChartData = data;
  const players = ['Moran','Gonzalo','Mewis','Muñi','Arias'].filter(p => data.some(r => r.jugador === p));

  let labels, datasets;
  if (chartGranularity === 'date') {
    const allDates = [...new Set(data.map(r => r.fecha))].sort();
    initDateRange(allDates);
    document.getElementById('chart-date-range').style.display = '';
    const dateDates = allDates.slice(chartRangeMin, chartRangeMax + 1);
    labels = dateDates.map(d => d.split('-').reverse().join('/'));
    datasets = players.map(p => {
      const color = PLAYER_COLORS[p].fg;
      return {
        label: p,
        data: dateDates.map(d => data.find(r => r.fecha === d && r.jugador === p)?.score ?? null),
        hidden: scoreHiddenPlayers.has(p),
        borderColor: color, backgroundColor: color + '22',
        spanGaps: false, tension: 0.3, pointRadius: 3, borderWidth: 2,
      };
    });
  } else {
    document.getElementById('chart-date-range').style.display = 'none';
    const keys = [...new Set(data.map(r => r.fecha.slice(0,7)))].sort();
    labels = keys.map(k => {
      const [y, m] = k.split('-');
      return `${MONTHS_ES[parseInt(m)-1]} ${y.slice(2)}`;
    });
    datasets = players.map(p => {
      const color = PLAYER_COLORS[p].fg;
      return {
        label: p,
        data: keys.map(k => {
          const rows = data.filter(r => r.jugador === p && r.fecha.startsWith(k));
          return rows.length ? Math.round(rows.reduce((s, r) => s + r.score, 0) / rows.length) : null;
        }),
        hidden: scoreHiddenPlayers.has(p),
        borderColor: color, backgroundColor: color + '22',
        spanGaps: false, tension: 0.3, pointRadius: 4, borderWidth: 2,
      };
    });
  }

  if (scoreChartInstance) {
    scoreHiddenPlayers = new Set(
      scoreChartInstance.data.datasets
        .filter((ds, i) => !scoreChartInstance.isDatasetVisible(i))
        .map(ds => ds.label)
    );
    scoreChartInstance.destroy();
  }
  scoreChartInstance = new Chart(
    document.getElementById('score-chart'),
    { type: 'line', data: { labels, datasets }, options: chartBaseOptions() }
  );
}

function renderWinsChart(data) {
  const players = ['Moran','Gonzalo','Mewis','Muñi','Arias'].filter(p => data.some(r => r.jugador === p));

  const byDate = {};
  data.forEach(r => { (byDate[r.fecha] = byDate[r.fecha] || []).push(r); });

  const winsOpts = chartBaseOptions({ scales: {
    x: { ticks:{ color:'#555', maxRotation:45, font:{size:10} }, grid:{color:'#1e1e1e'} },
    y: { min:0, ticks:{ color:'#555', font:{size:10}, stepSize:1 }, grid:{color:'#1e1e1e'} },
  }});

  let labels, datasets;

  if (chartGranularity === 'date') {
    const allDates = [...new Set(data.map(r => r.fecha))].sort();
    const dateDates = allDates.slice(chartRangeMin, chartRangeMax + 1);
    labels = dateDates.map(d => d.split('-').reverse().join('/'));
    datasets = players.map(p => {
      const color = PLAYER_COLORS[p].fg;
      let cum = allDates.slice(0, chartRangeMin).reduce((acc, d) => {
        const winner = (byDate[d] || []).reduce((a, b) => a.score > b.score ? a : b, { score:-1, jugador:null });
        return acc + (winner.jugador === p ? 1 : 0);
      }, 0);
      return {
        label: p,
        data: dateDates.map(d => {
          const winner = (byDate[d] || []).reduce((a, b) => a.score > b.score ? a : b, { score:-1, jugador:null });
          if (winner.jugador === p) cum++;
          return cum;
        }),
        hidden: winsHiddenPlayers.has(p),
        borderColor: color, backgroundColor: color + '22',
        tension: 0.1, pointRadius: 0, borderWidth: 2,
      };
    });
  } else {
    const keys = [...new Set(data.map(r => r.fecha.slice(0,7)))].sort();
    labels = keys.map(k => { const [y,m] = k.split('-'); return `${MONTHS_ES[parseInt(m)-1]} ${y.slice(2)}`; });
    datasets = players.map(p => {
      const color = PLAYER_COLORS[p].fg;
      let cum = 0;
      return {
        label: p,
        data: keys.map(k => {
          const datesInMonth = [...new Set(data.filter(r => r.fecha.startsWith(k)).map(r => r.fecha))].sort();
          datesInMonth.forEach(d => {
            const winner = (byDate[d] || []).reduce((a, b) => a.score > b.score ? a : b, { score:-1, jugador:null });
            if (winner.jugador === p) cum++;
          });
          return cum;
        }),
        hidden: winsHiddenPlayers.has(p),
        borderColor: color, backgroundColor: color + '22',
        tension: 0.1, pointRadius: 0, borderWidth: 2,
      };
    });
  }

  if (winsChartInstance) {
    winsHiddenPlayers = new Set(
      winsChartInstance.data.datasets
        .filter((ds, i) => !winsChartInstance.isDatasetVisible(i))
        .map(ds => ds.label)
    );
    winsChartInstance.destroy();
  }
  winsChartInstance = new Chart(
    document.getElementById('wins-line-chart'),
    { type: 'line', data: { labels, datasets }, options: winsOpts }
  );
}

// ─── HISTORY ─────────────────────────────────────────────
function renderHistoryTable() {
  const filter = document.getElementById('history-month-filter')?.value || '';
  let rows = filter ? historyData.filter(r => r.fecha.startsWith(filter)) : [...historyData];

  rows.sort((a, b) => historySortDir * a.fecha.localeCompare(b.fecha));

  const dates = [...new Set(rows.map(r => r.fecha))];
  const byDate = {};
  rows.forEach(r => {
    if (!byDate[r.fecha]) byDate[r.fecha] = [];
    byDate[r.fecha].push(r);
  });

  const arrow = historySortDir === -1 ? ' ↓' : ' ↑';
  let html = `<thead><tr>
    <th class="sortable sort-active" onclick="toggleHistorySort()">Fecha${arrow}</th>
    <th>Jugador</th><th>R1</th><th>R2</th><th>R3</th><th>R4</th><th>R5</th><th>Score</th>
  </tr></thead><tbody>`;

  dates.forEach(fecha => {
    const entries = byDate[fecha];
    const maxScore = Math.max(...entries.map(e => e.score));
    [...entries].sort((a, b) => b.score - a.score).forEach(e => {
      const isWinner = e.score === maxScore;
      html += `<tr>
        <td>${fecha.split('-').reverse().join('/')}</td>
        <td>${e.jugador}${isWinner ? ' <span class="winner-badge">win</span>' : ''}</td>
        <td>${e.r1}</td><td>${e.r2}</td><td>${e.r3}</td><td>${e.r4}</td><td>${e.r5}</td>
        <td style="color:var(--accent);font-weight:500">${e.score}</td>
      </tr>`;
    });
  });

  html += '</tbody>';
  document.getElementById('history-table').innerHTML = html;
}

function toggleHistorySort() {
  historySortDir *= -1;
  renderHistoryTable();
}

function filterHistory() {
  renderHistoryTable();
}

async function loadHistory() {
  document.getElementById('history-loading').style.display = 'block';
  document.getElementById('history-content').style.display = 'none';

  try {
    historyData = await readSheet();

    const months = [...new Set(historyData.map(r => r.fecha.slice(0, 7)))].sort().reverse();
    const sel = document.getElementById('history-month-filter');
    sel.innerHTML = '<option value="">Todos los meses</option>';
    months.forEach(m => {
      const [year, month] = m.split('-');
      const label = `${MONTHS_ES[parseInt(month) - 1]} ${year.slice(2)}`;
      sel.innerHTML += `<option value="${m}">${label}</option>`;
    });

    renderHistoryTable();
    historyLoaded = true;
  } catch(e) {
    console.error('loadHistory error:', e);
    document.getElementById('history-loading').innerHTML = `<p style="color:var(--danger)">Error cargando historial: ${e.message}</p>`;
    return;
  }

  document.getElementById('history-loading').style.display = 'none';
  document.getElementById('history-content').style.display = 'block';
}

const savedPlayer = localStorage.getItem(PLAYER_KEY);
if (savedPlayer && PLAYERS.includes(savedPlayer)) {
  selectPlayer(savedPlayer);
}
</script>
</body>
</html>
